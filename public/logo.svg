<svg viewBox="0 0 160 160" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mooseFur" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8A5A36" />
      <stop offset="100%" stop-color="#5C3A21" />
    </linearGradient>
    <linearGradient id="snoutGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D29A74" />
      <stop offset="100%" stop-color="#B07C58" />
    </linearGradient>
    <linearGradient id="antlerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FED766" />
      <stop offset="100%" stop-color="#EE964B" />
    </linearGradient>
    <linearGradient id="backgroundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
  </defs>

  <!-- Circular app background -->
  <circle cx="80" cy="80" r="76" fill="url(#backgroundGrad)" stroke="#1E293B" stroke-width="3" />

  <!-- ANTLER LEFT -->
  <path d="M 40 60 C 20 50, 10 35, 12 15 C 13 10, 22 10, 23 18 C 24 30, 32 38, 38 42 C 34 25, 25 15, 29 5 C 32 0, 39 5, 41 15 C 44 26, 46 36, 45 42 C 48 24, 48 10, 54 8 C 59 6, 62 14, 58 26 C 54 36, 50 48, 48 55 Z" fill="url(#antlerGrad)" stroke="#A06020" stroke-width="1.5" />

  <!-- ANTLER RIGHT -->
  <path d="M 120 60 C 140 50, 150 35, 148 15 C 147 10, 138 10, 137 18 C 136 30, 128 38, 122 42 C 126 25, 135 15, 131 5 C 128 0, 121 5, 119 15 C 116 26, 114 36, 115 42 C 112 24, 112 10, 106 8 C 101 6, 98 14, 102 26 C 106 36, 110 48, 112 55 Z" fill="url(#antlerGrad)" stroke="#A06020" stroke-width="1.5" />

  <!-- SUIT JACKET / BODY -->
  <path d="M 40 135 Q 15 145, 15 160 L 145 160 Q 145 145, 120 135 Z" fill="#1E293B" stroke="#0F172A" stroke-width="1.5" />

  <!-- WHITE SHIRT V-NECK -->
  <path d="M 68 135 L 80 154 L 92 135 Z" fill="#FFFFFF" />

  <!-- YELLOW TIE & KNOT -->
  <path d="M 78 148 L 82 148 L 84 159 L 80 163 L 76 159 Z" fill="#FDE047" stroke="#EAB308" stroke-width="0.5" />
  <path d="M 77 145 L 83 145 L 81 149 L 79 149 Z" fill="#EAB308" />

  <!-- SUIT LAPELS -->
  <path d="M 62 135 L 74 151 L 74 135 Z" fill="#334155" stroke="#0F172A" stroke-width="1" />
  <path d="M 98 135 L 86 151 L 86 135 Z" fill="#334155" stroke="#0F172A" stroke-width="1" />

  <!-- EAR LEFT -->
  <path d="M 48 80 C 25 78, 20 88, 18 95 C 18 100, 30 100, 42 90 Z" fill="#5C3A21" stroke="#402010" stroke-width="1.5" />
  <!-- Ear left pink inner -->
  <path d="M 42 84 C 28 85, 26 91, 36 90 Z" fill="#E89B9B" />

  <!-- EAR RIGHT -->
  <path d="M 112 80 C 135 78, 140 88, 142 95 C 142 100, 130 100, 118 90 Z" fill="#5C3A21" stroke="#402010" stroke-width="1.5" />
  <!-- Ear right pink inner -->
  <path d="M 118 84 C 132 85, 134 91, 124 90 Z" fill="#E89B9B" />

  <!-- MAIN ROUNDED HEAD -->
  <rect x="42" y="62" width="76" height="66" rx="32" fill="url(#mooseFur)" stroke="#402010" stroke-width="2" />

  <!-- EYES -->
  <!-- Eye Left -->
  <ellipse cx="65" cy="85" rx="8" ry="11" fill="#FFFFFF" stroke="#402010" stroke-width="1.5" />
  <circle cx="65" cy="84" r="4.5" fill="#101827" />
  <circle cx="63" cy="81" r="1.5" fill="#FFFFFF" />

  <!-- Eye Right -->
  <ellipse cx="95" cy="85" rx="8" ry="11" fill="#FFFFFF" stroke="#402010" stroke-width="1.5" />
  <circle cx="95" cy="84" r="4.5" fill="#101827" />
  <circle cx="93" cy="81" r="1.5" fill="#FFFFFF" />

  <!-- HIGH END GLASSES -->
  <g stroke="#000000" stroke-dashoffset="0" stroke-width="2.5" fill="none">
    <rect x="52" y="77" width="23" height="18" rx="6" stroke="#000000" />
    <rect x="85" y="77" width="23" height="18" rx="6" stroke="#000000" />
    <line x1="75" y1="84" x2="85" y2="84" />
    <line x1="42" y1="82" x2="52" y2="82" />
    <line x1="108" y1="82" x2="118" y2="82" />
  </g>

  <!-- MOOSE NOSE & SNOUT -->
  <path d="M 50 100 Q 80 82, 110 100 Q 112 118, 80 122 Q 48 118, 50 100 Z" fill="url(#snoutGrad)" stroke="#402010" stroke-width="1.5" />
  
  <!-- Nostrils -->
  <circle cx="71" cy="104" r="2.5" fill="#4A2F1B" />
  <circle cx="89" cy="104" r="2.5" fill="#4A2F1B" />

  <!-- MOUTH -->
  <path d="M 72 113 Q 80 118, 88 113" fill="none" stroke="#5C1010" stroke-width="3" stroke-linecap="round" />

  <!-- Red, warm Swedish blush cheeks -->
  <circle cx="49" cy="98" r="4.5" fill="#FF8A8A" opacity="0.4" />
  <circle cx="111" cy="98" r="4.5" fill="#FF8A8A" opacity="0.4" />
</svg>
